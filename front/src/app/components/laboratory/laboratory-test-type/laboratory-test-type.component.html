<main id="main" class="main">
  <div class="pagetitle">
    <h1>Laboratory Test Type</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item active">Laboratory Test Type</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card overflow-auto">
          <div class="card-body">
            <div class="row">
              <div class="col-md-6">
                <h5 class="card-title">Laboratory Test Type List</h5>
              </div>
              <div class="col-md-6">
                <button
                type="button"
                class="btn btn-success float-end mt-3 ms-1"
                (click)="exportToExcel()"
              >
                Export To Excel
              </button>
                <button
                  type="button"
                  class="btn btn-primary float-end mt-3"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop"
                  (click)="modalAdd()"
                >
                  <i class="bi bi-plus-lg"></i>
                  Lab Test Type
                </button>
              </div>
            </div>
            <div class="row justify-content-between">
              <div class="col-md-2 mb-3">
                <select
                  (change)="onTableSizeChange($event)"
                  class="form-select mt-2"
                  id="pagination"
                >
                  <option *ngFor="let size of tableSizes">{{ size }}</option>
                </select>
              </div>
              <div class="col-md-4 mb-3">
                <label for="total-labtest-type" class="mt-3 h6"
                  >Total Laboratory Test Type List
                  <strong class="total-num">{{
                    labTestTypeList$.length
                  }}</strong></label
                >
              </div>
              <div class="col-md-4 mb-3">
                <input
                  type="text"
                  id="search"
                  name="searchName"
                  [(ngModel)]="searchName"
                  class="form-control mt-2"
                  (ngModelChange)="searchByName()"
                  placeholder="Search here ..."
                />
              </div>
            </div>
            <table class="table" id="lab-test-type-table">
              <thead>
                <tr>
                <th style="cursor: pointer" (click)="sort('id')">
                  Id<i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('id')">
                  Name<i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('id')">
                  Lab Test Category ID<i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('id')">
                  Price<i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('id')">
                  Description<i class="fa fa-fw fa-sort"></i>
                </th>
                <th>Action</th>
              </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let item of labTestTypeList$
                  "
                >
                  <td>{{ item.id }}</td>
                  <td>{{ item.name }}</td>
                  <td>
                    {{ labTestCategoryMap.get(item.laboratoryTestCategoryId) }}
                  </td>
                  <td>{{ item.price }}</td>
                  <td>{{ item.description }}</td>
                  <td>
                    <i
                      (click)="modalEdit(item)"
                      data-bs-toggle="modal"
                      data-bs-target="#staticBackdrop"
                      class="bi bi-pencil-square icon-edit"
                    ></i>
                    <i
                      (click)="delete(item)"
                      class="bi bi-trash icon-delete"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
            <pagination-controls
              (pageChange)="onTableDataChange($event)"
            ></pagination-controls>

            <div
              class="modal fade"
              id="staticBackdrop"
              data-bs-backdrop="static"
              data-bs-keyboard="false"
              tabindex="-1"
              aria-labelledby="staticBackdropLabel"
              aria-hidden="true"
            >
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="staticBackdropLabel">
                      {{ modalTitle }}
                    </h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                      (click)="modalClose()"
                      id="add-edit-modal-close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <app-laboratory-test-type-form
                      [labTestTypeList]="labTestTypeList"
                      *ngIf="activateLabTestTypeComponent"
                    >
                    </app-laboratory-test-type-form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
