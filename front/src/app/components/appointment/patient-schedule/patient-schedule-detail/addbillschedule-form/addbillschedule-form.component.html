<form>
  <div class="mb-3">
    <label for="employeeId" class="col-sm-5 col-form-label">Employee</label>
    <div class="col-sm-12">
      <select id="employeeId" [(ngModel)]="employeeId" name="employeeId">
        <option *ngFor="let item of employeeList$" [value]="item.id">{{
          item.firstName + " " + item.lastName
        }}</option>
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Service Charge</label>
    <div class="col-sm-12">
      <select
        id="serviceChargeId"
        [(ngModel)]="serviceChargeId"
        name="serviceChargeId"
        ><option value="null">---Service Charge : Price ---</option>
        <option
          *ngFor="let item of getServiceChargeIdList$ | async as list"
          [value]="item.id"
          >{{ item.name + "  :  " + item.price }}</option
        >
      </select>
    </div>
  </div>

  <div class="mb-3">
    <label for="date" class="form-label">Date</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="date"
      name="date"
    />
  </div>

  <div class="text-center float-end justify-right">
    <button
      (click)="addBillSchedules()"
      *ngIf="billSchedulesList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="billSchedulesList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateBillSchedules()"
      *ngIf="billSchedulesList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="billSchedulesList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
