<form class="row g-3">
  <div class="col-12">
    <label for="startingTime" class="form-label">Starting Time</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="startingTime"
      name="startingTime"
    />
  </div>
  <div class="col-12">
    <label for="finishingTime" class="form-label">Finishing Time</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="finishingTime"
      name="finishingTime"
    />
  </div>
  <div class="col-12">
    <label for="employeeId" class="form-label">Employee</label>
    <select id="employeeId" [(ngModel)]="employeeId" name="employeeId">
      <option
        *ngFor="let item of employeeId$"
        [value]="item.id"
        >{{ item.firstName + " " + item.lastName }}</option
      >
    </select>
  </div>
  <div class="col-12">
    <label for="weekdayId" class="form-label">Week Day</label>
    <select id="weekdayId" [(ngModel)]="weekdayId" name="weekdayId">
      <option
        *ngFor="let item of weekdayId$ | async as list"
        [value]="item.id"
        >{{ item.name }}</option
      >
    </select>
  </div>
  <div class="col-12">
    <label for="appointmentDurationId" class="form-label">Appointment Duration</label>
    <select id="appointmentDurationId" [(ngModel)]="appointmentDurationId" name="appointmentDurationId">
      <option
        *ngFor="let item of appointmentDurationId$ | async as list"
        [value]="item.id"
        >{{ item.name }}</option
      >
    </select>
  </div>
  <div class="text-center float-end justify-right">
    <button
      (click)="addSchedule()"
      *ngIf="scheduleList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button type="reset" *ngIf="scheduleList.id == 0" class="btn btn-info ms-3">
      Reset
    </button>
    <button
      (click)="updateSchedule()"
      *ngIf="scheduleList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button type="reset" *ngIf="scheduleList.id != 0" class="btn btn-info ms-3">
      Reset
    </button>
  </div>
</form>
