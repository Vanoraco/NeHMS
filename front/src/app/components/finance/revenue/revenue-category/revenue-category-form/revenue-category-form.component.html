<form #revenueForm="ngForm">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="name"
      name="name"
      required
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #Name="ngModel"
      class="form-control"
      [ngClass]="{ 'is-invalid': Name.errors && Name.touched }"

    />
    <span
        class="text-danger"
        *ngIf="(Name.touched || revenueForm.submitted) && Name.invalid"
      >
        Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
      required
    />
  </div>

  <div class="text-center float-end justify-right">
    <button
      (click)="addRevenueCategory()"
      *ngIf="revenueCategoryList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="revenueCategoryList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateRevenueCategory()"
      *ngIf="revenueCategoryList.id != 0"
      class="btn btn-primary"
      [disabled]="revenueForm.invalid"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="revenueCategoryList.id != 0"
      class="btn btn-info ms-3"
      [disabled]="revenueForm.invalid"
    >
      Reset
    </button>
  </div>
</form>
