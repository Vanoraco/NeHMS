  <div class="mb-3">
    <label for="date" class="form-label">Date</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="date"
      name="date"
      required
    />
  </div>
  <div class="mb-3">
    <label for="month" class="form-label">Month</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="month"
      name="month"
      required
    />
  </div>
  <div class="mb-3">
    <label for="year" class="form-label">Year</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="year"
      name="year"
      required
    />
  </div>
  <div class="text-center float-end">
    <button
      (click)="payrollCalculation()"
      *ngIf="payrollReportList.id == 0"
      class="btn btn-primary"
    >
      Calculate
    </button>
    <button
      type="reset"
      *ngIf="payrollReportList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updatePayrollReport()"
      *ngIf="payrollReportList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="payrollReportList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
