<form>
  <div class="mb-3">
    <label for="name" class="form-label">Pharmacy Expense Category</label>
    <select
      id="pharmacyExpenseCatagoryId"
      [(ngModel)]="pharmacyExpenseCatagoryId"
      name="pharmacyExpenseCatagoryId"
    >
      <option
        *ngFor="let item of expenseCategoryId$ | async as list"
        selected
        [value]="item.id"
        >{{ item.catagory }}</option
      >
    </select>
  </div>
  <div class="mb-3">
    <label for="amount" class="form-label">Amount</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="amount"
      name="amount"
    />
  </div>
  <div class="mb-3">
    <label for="date" class="form-label">Date</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="date"
      name="date"
    />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="float-end">
    <button
      (click)="addPharmacyExpense()"
      *ngIf="pharmacyExpenseList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="pharmacyExpenseList.id == 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
    <button
      (click)="updatePharmacyExpense()"
      *ngIf="pharmacyExpenseList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="pharmacyExpenseList.id != 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
  </div>
</form>
