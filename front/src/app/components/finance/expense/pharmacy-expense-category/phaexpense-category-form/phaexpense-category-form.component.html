<form #phaexpenForm="ngForm">
  <div class="mb-3">
    <label for="catagory" class="form-label">Pharmacy Expense Category</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="catagory"
      name="catagory"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #Name="ngModel"
    />
    <span
      class="text-danger"
      *ngIf="(Name.touched || phaexpenForm.submitted) && Name.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="float-end">
    <button
      (click)="addExpenseCategory()"
      *ngIf="expenseCategoryList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="expenseCategoryList.id == 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
    <button
      (click)="updateExpenseCategory()"
      *ngIf="expenseCategoryList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="expenseCategoryList.id != 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
  </div>
</form>
