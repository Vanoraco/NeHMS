<main>
  <div class="container">
    <section
      class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div
            class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center"
          >
            <div class="d-flex justify-content-center py-4">
              <a
                routerLink="/login"
                class="logo d-flex align-items-center w-auto"
              >
                <img src="assets/img/logo.png" alt="hospital logo" />
                <span class="d-none d-lg-block">Admin</span>
              </a>
            </div>
            <div class="card mb-3">
              <div class="card-body">
                <div class="pt-4 pb-2">
                  <h5 class="card-title text-center pb-0 fs-4">
                    Login to Your Account
                  </h5>
                  <p class="text-center small">
                    Enter your email address & password to login
                  </p>
                </div>
                <form class="row g-3" [formGroup]="loginForm" 
                (ngSubmit)="loginUser()">
                  <div class="col-lg-12">
                    <label for="youremailAddress" class="form-label"
                      >Email Address</label
                    >
                    <div class="input-group">
                      <input
                        type="email"
                        formControlName="emailAddress"
                        class="form-control"
                        id="youremailAddress"
                        [ngClass]="{
                          'is-invalid':
                            submitted && controls['emailAddress'].errors
                        }"
                      />
                      <div
                        class="invalid-feedback"
                        *ngIf="
                          !submitted &&
                          controls['emailAddress'].valid &&
                          controls['emailAddress'].touched
                        "
                      >
                        Invalid email address
                      </div>
                    </div>
                  </div>
                  <div class="col-lg-12">
                    <label for="yourPassword" class="form-label"
                      >Password</label
                    >
                    <div class="input-group mb-3">
                      <input
                        [type]="type"
                        formControlName="password"
                        class="form-control"
                        id="yourPassword"
                        [ngClass]="{
                          'is-invalid': submitted && controls['password'].errors
                        }"
                      />
                      <div
                        class="invalid-feedback"
                        *ngIf="
                          !submitted &&
                          controls['password'].valid &&
                          controls['password'].touched
                        "
                      >
                        Password must contain more than 8 characters, 1 upper
                        case letter, and 1 special character
                      </div>
                      <i
                        class="bi bi-{{ eyeIcon }} input-group-text"
                        (click)="showHidePass()"
                      ></i>
                    </div>
                  </div>
                  <div class="col-lg-12">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        name="remember"
                        value="true"
                        id="rememberMe"
                      />
                      <label class="form-check-label" for="rememberMe"
                        >Remember me</label
                      >
                    </div>
                  </div>
                  <div class="col-lg-12">
                    <button
                      class="btn btn-primary w-100"
                      [disabled]="loginForm.invalid"
                      type="submit"
                    >
                      Login
                    </button>
                  </div>
                  <div class="col-12">
                    <p class="small mb-0">
                      <a routerLink="/forgot-password">Forgot Password?</a>
                    </p>
                  </div>
                </form>
              </div>
            </div>
            <div class="credits">
              Loved by <a href="https://creavers.com/">Creavers Services PLC</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
