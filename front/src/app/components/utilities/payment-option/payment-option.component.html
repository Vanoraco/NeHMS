<main id="main" class="main">
  <div class="pagetitle">
    <h1>Settings</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item active">Settings</li>
        <li class="breadcrumb-item active">Payment Option</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <div class="card-title">Add Payment Option</div>
            <form
              class="row g-3 form-inline"
              [formGroup]="addForm"
              (ngSubmit)="addPaymentOption()"
            >
              <div class="col-12">
                <label for="name" class="form-label">Payment Name</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="name"
                  [ngClass]="{
                    'is-invalid': submitted && controls['name'].errors
                  }"
                  name="name"
                />
                <div
                  class="invalid-feedback"
                  *ngIf="submitted && controls['name'].errors"
                >
                  <span *ngIf="controls['name'].errors['required']">
                    Name is required
                  </span>
                  <span *ngIf="controls['name'].errors['minlength']">
                    Name is Must >=3
                  </span>
                  <span *ngIf="controls['name'].errors['pattern']">
                    Name is Must A to Z
                  </span>
                </div>
              </div>
              <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="description"
                  name="description"
                />
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-primary">
                  {{ buttonText }}
                </button>
                <button
                  type="reset"
                  class="btn btn-secondary"
                  (click)="resetForm()"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card overflow-auto">
          <div class="card-body">
            <div class="row justify-content-between">
              <div class="col-6">
                <h5 class="card-title">Payment Option List</h5>
              </div>
              <div class="col-6">
                <label for="total-payment" class="mt-3 h6"
                  >Total Payment Option List
                  <strong class="total-num">{{
                    paymentOptionList.length
                  }}</strong></label
                >
              </div>
            </div>
            <div class="row justify-content-between">
              <div class="col-2 mb-3">
                <select
                  (change)="onTableSizeChange($event)"
                  class="form-select mt-2"
                  id="pagination"
                >
                  <option *ngFor="let size of tableSizes">{{ size }}</option>
                </select>
              </div>
              <div class="col-4 mb-3">
                <input
                  type="text"
                  id="search"
                  name="searchName"
                  [(ngModel)]="searchName"
                  class="form-control mt-2"
                  (ngModelChange)="searchByName()"
                  placeholder="Search here ..."
                />
              </div>
            </div>
            <table class="table">
              <thead>
                <th style="cursor: pointer" (click)="sort('id')">
                  Id<i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('name')">
                  Payment Option <i class="fa fa-fw fa-sort"></i>
                </th>
                <th style="cursor: pointer" (click)="sort('description')">
                  Description<i class="fa fa-fw fa-sort"></i>
                </th>
                <th>Action</th>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let item of paymentOptionList
                  "
                >
                  <td>{{ item.id }}</td>
                  <td>{{ item.name }}</td>
                  <td>{{ item.description }}</td>
                  <td>
                    <i
                      (click)="updatePaymentOption(item.id)"
                      class="bi bi-pencil-square icon-edit"
                    ></i>
                    <i
                      (click)="deletePaymentOption(item.id)"
                      class="bi bi-trash icon-delete"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
            <pagination-controls
              (pageChange)="onTableDataChange($event)"
            ></pagination-controls>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
