<div class="row justify-content-between">
  <div class="col-md-2 mb-2">
    <select
      (change)="onTableSizeChange($event)"
      class="form-select"
      id="pagination"
    >
      <option *ngFor="let size of tableSizes">{{ size }}</option>
    </select>
  </div>
  <div class="col-md-6 mb-2">
    <input
      type="text"
      id="search"
      name="searchName"
      [(ngModel)]="searchName"
      class="form-control"
      (ngModelChange)="searchByName()"
      placeholder="Search here ..."
    />
  </div>
  <div class="col-md-4 mb-2">
    <button
      type="button"
      class="btn btn-primary float-end"
      data-bs-toggle="modal"
      data-bs-target="#overtimeModal"
      (click)="modalAdd()"
    >
      <strong>+</strong> Overtime
    </button>
  </div>
</div>
<table class="table">
  <thead>
    <tr>
      <th style="cursor: pointer" (click)="sort('id')">
        Id<i class="fa fa-fw fa-sort"></i>
      </th>
      <th style="cursor: pointer" (click)="sort('id')">
        Employee<i class="fa fa-fw fa-sort"></i>
      </th>
      <th style="cursor: pointer" (click)="sort('id')">
        Date<i class="fa fa-fw fa-sort"></i>
      </th>
      <th style="cursor: pointer" (click)="sort('id')">
        Hours<i class="fa fa-fw fa-sort"></i>
      </th>
      <th style="cursor: pointer" (click)="sort('id')">
        Fixed Amount<i class="fa fa-fw fa-sort"></i>
      </th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr
      *ngFor="
        let item of overtimeList$
      "
    >
      <td>{{ item.id }}</td>
      <td>{{ employeeNameMap.get(item.employeeId) }}</td>
      <td>{{ item.date | date : "mediumDate" }}</td>
      <td>{{ item.hours }} hr</td>
      <td>{{ item.fixedAmount }}</td>
      <td>
        <i
          (click)="modalEdit(item)"
          data-bs-toggle="modal"
          data-bs-target="#overtimeModal"
          class="bi bi-pencil-square icon-edit"
        ></i>
        <i (click)="delete(item)" class="bi bi-trash icon-delete"></i>
      </td>
    </tr>
  </tbody>
</table>
<div
  class="modal fade"
  id="overtimeModal"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="overtimeModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog rounded-1 border border-0">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="overtimeModalLabel">
          {{ modalTitle }}
        </h5>
        <button
          type="button"
          class="btn bg-white rounded-circle btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
          (click)="modalClose()"
          id="overtime-modal-close"
        ></button>
      </div>
      <div class="modal-body">
        <app-add-edit-overtime
          [overtimeList]="overtimeList"
          *ngIf="activateovertimeComponent"
        >
        </app-add-edit-overtime>
      </div>
    </div>
  </div>
</div>
