<main id="main" class="main">
  <div class="pagetitle">
    <h1>Notice | {{ noticeData.name }}</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item active">Notice</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card overflow-auto">
          <div class="card-body">
            <div class="container">
              <div class="row">
                <div class="col" id="printData">
                  <table class="table mt-3">
                    <thead class="table-primary">
                      <tr class="m-3 ps-3 text-bold">
                        <th scope="col" colspan="2">{{ noticeData.name }}</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <th scope="col">ID :</th>
                        <td>{{ noticeData.id }}</td>
                      </tr>
                      <tr>
                        <th scope="col">Name/Author :</th>
                        <td>
                          {{ noticeData.name }}
                        </td>
                      </tr>
                      <tr>
                        <th scope="col">Notice Board :</th>
                        <td>
                          {{ noticeData.noticeBoard }}
                        </td>
                      </tr>
                      <tr>
                        <th scope="col">Description :</th>
                        <td>
                          {{ noticeData.description }}
                        </td>
                      </tr>
                      <tr>
                        <th scope="col">Date :</th>
                        <td>
                          {{ noticeData.date | date : "medium" }}
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="justify-right">
                <button
                  type="button"
                  (click)="printPDF()"
                  class="btn btn-outline-primary"
                >
                  <i class="bi bi-printer"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
