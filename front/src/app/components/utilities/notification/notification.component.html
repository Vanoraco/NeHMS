<main id="main" class="main">
  <div class="pagetitle">
    <h1>Notification</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item active">Notification</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card overflow-auto">
          <div class="card-body">
            <div class="row justify-content-between pt-3">
              <div class="col-2 mb-2">
                <select
                  (change)="onTableSizeChange($event)"
                  class="form-select"
                  id="pagination"
                >
                  <option *ngFor="let size of tableSizes">{{ size }}</option>
                </select>
              </div>
              <div class="col-4 mb-2">
                <input
                  type="text"
                  id="search"
                  name="searchName"
                  [(ngModel)]="searchName"
                  class="form-control"
                  (ngModelChange)="searchByName()"
                  placeholder="Search here ..."
                />
              </div>
              <div class="col-4 mb-2">
                <button
                  type="button"
                  class="btn btn-primary float-end"
                  data-bs-toggle="modal"
                  data-bs-target="#notification-modal"
                  (click)="modalAdd()"
                >
                  <strong>+</strong>
                  Notification
                </button>
              </div>
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th style="cursor: pointer; width: 5%;" (click)="sort('id')">
                    Id<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer; width: 15%;" (click)="sort('employeeId')">
                    Employee<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer; width: 10%;" (click)="sort('heading')">
                    Title<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer; width: 10%;" (click)="sort('status')">
                    Status<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer; width: 40%;" (click)="sort('description')">
                    Description <i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer; width: 10%;" (click)="sort('date')">
                    Date<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="width: 10%;">Action</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let item of notificationList$
                  "
                >
                  <td>{{ item.id }}</td>
                  <td>{{ employeeMap.get(item.employeeId) }}</td>
                  <td>{{ item.title }}</td>
                  <td>{{ item.status }}</td>
                  <td>{{ item.description }}</td>
                  <td>{{ item.date | date : "mediumDate" }}</td>
                  <td>
                    <i
                      (click)="modalShow(item)"
                      data-bs-toggle="modal"
                      data-toggle="tooltip"
                      data-placement="bottom"
                      data-bs-target="#notification-show-modal"
                      class="bi bi-menu-button-wide icon-edit"
                    ></i>
                    <i
                      (click)="modalEdit(item)"
                      data-bs-toggle="modal"
                      data-toggle="tooltip"
                      data-placement="bottom"
                      data-bs-target="#notification-modal"
                      class="bi bi-pencil-square icon-edit"
                    ></i>
                    <i
                      (click)="delete(item)"
                      class="bi bi-trash icon-delete"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
            <pagination-controls
              (pageChange)="onTableDataChange($event)"
            ></pagination-controls>

            <div
              class="modal fade"
              id="notification-modal"
              data-bs-backdrop="static"
              data-bs-keyboard="false"
              tabindex="-1"
              aria-labelledby="notification-modalLabel"
              aria-hidden="true"
            >
              <div class="modal-dialog modal-lg rounded-1 border border-0">
                <div class="modal-content">
                  <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="notification-modalLabel">
                      {{ modalTitle }}
                    </h5>
                    <button
                      type="button"
                      class="btn bg-white rounded-circle btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                      (click)="modalClose()"
                      id="notification-modal-close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <app-notification-form
                      [notificationList]="notificationList"
                      *ngIf="activateNotificationComponent"
                    >
                    </app-notification-form>
                  </div>
                </div>
              </div>
            </div>

            <div
              class="modal fade"
              id="notification-show-modal"
              data-bs-backdrop="static"
              data-bs-keyboard="false"
              tabindex="-1"
              aria-labelledby="notification-show-modalLabel"
              aria-hidden="true"
            >
              <div class="modal-dialog modal-lg">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="notification-show-modalLabel">
                      {{ modalShowTitle }}
                    </h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                      (click)="modalClose()"
                      id="notification-modal-close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <app-notification-form
                      [notificationList]="notificationList"
                      *ngIf="activateShowNotificationComponent"
                    >
                    </app-notification-form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
