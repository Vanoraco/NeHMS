<div class="row justify-content-between">
  <div class="col-md-2 mb-2">
    <select
      (change)="onTableSizeChange($event)"
      class="form-select"
      id="pagination"
    >
      <option *ngFor="let size of tableSizes">{{ size }}</option>
    </select>
  </div>
  <div class="col-md-6 mb-2">
    <input
      type="text"
      id="search"
      name="searchName"
      [(ngModel)]="searchName"
      class="form-control"
      (ngModelChange)="searchByName()"
      placeholder="Search here ..."
    />
  </div>
  <div class="col-md-4 mb-2">
    <button
      type="button"
      class="btn btn-primary float-end"
      data-bs-toggle="modal"
      data-bs-target="#holidayStaticBackdrop"
      (click)="modalAdd()"
    >
      <strong>+</strong> Holiday
    </button>
  </div>
</div>
<table class="table">
  <thead>
    <tr>
      <th>Id</th>
      <th>Employee</th>
      <th>Start Date</th>
      <th>End date</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of holidayList$">
      <td>{{ item.id }}</td>
      <td>{{ employeeNameMap.get(item.employeeId) }}</td>
      <td>{{ item.startDate | date : "medium" }}</td>
      <td>{{ item.endDate | date : "medium" }}</td>
      <td>
        <i
          (click)="modalEdit(item)"
          data-bs-toggle="modal"
          data-bs-target="#holidayStaticBackdrop"
          class="bi bi-pencil-square icon-edit"
        ></i>
        <i (click)="delete(item)" class="bi bi-trash icon-delete"></i>
      </td>
    </tr>
  </tbody>
</table>
<div
  class="modal fade"
  id="holidayStaticBackdrop"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="holidayStaticBackdropLabel"
  aria-hidden="true"
>
  <div class="modal-dialog rounded-1 border border-0">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="holidayStaticBackdropLabel">
          {{ modalTitle }}
        </h5>
        <button
          type="button"
          class="btn bg-white rounded-circle btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
          (click)="modalClose()"
          id="holiday-modal-close"
        ></button>
      </div>
      <div class="modal-body">
        <app-add-edit-holiday
          [holidayList]="holidayList"
          *ngIf="activateHolidayComponent"
        >
        </app-add-edit-holiday>
      </div>
    </div>
  </div>
</div>
