<form #wardForm="ngForm" >
<div class="row">
  <div class="col-lg-6">
    <div class="mb-3">
      <label class="col-sm-5 col-form-label">Building</label>
      <div class="col-sm-12">
        <select
          class="form-select"
          [(ngModel)]="buildingNumberId"
          name="buildingNumberId"
        >
          <option *ngFor="let item of bulidingName$" [value]="item.id">
            {{ item.name }}
          </option>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <label for="name" class="form-label">Ward Name</label>
      <input
       type="text"
       pattern="[a-zA-Z\s]+$"
       minlength="2"
      #WardName="ngModel" 
       class="form-control" 
       [(ngModel)]="name" 
       name="name" />
       <span
            class="text-danger"
            *ngIf="(WardName.touched || wardForm.submitted) && WardName.invalid"
          >
            Please enter a valid input
          </span>
    </div>
    <div class="mb-3">
      <label for="code" class="form-label">Ward Code</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="code"
        name="code"
      />
    </div>
  </div>
  <div class="col-lg-6">
    <div class="mb-3">
      <label for="code" class="form-label">Floor Number</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="floorNumber"
        name="floorNumber"
      />
    </div>
    <div class="mb-3">
      <label class="col-sm-5 col-form-label">Ward Type</label>
      <div class="col-sm-12">
        <select class="form-select" [(ngModel)]="wardTypeId" name="wardTypeId">
          <option *ngFor="let item of wardTypes$" [value]="item.id">
            {{ item.name }}
          </option>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <label class="col-sm-5 col-form-label">Is Private</label>
      <div class="col-sm-12">
        <select class="form-select" [(ngModel)]="isprivate" name="isprivate">
          <option [value]="true">true</option>
          <option [value]="false">false</option>
        </select>
      </div>
    </div>
  </div>
  <button (click)="addWard()" *ngIf="wardList.id == 0" class="btn btn-primary">
    Add
  </button>
  <button
    (click)="updateWard()"
    *ngIf="wardList.id != 0"
    class="btn btn-primary"
  >
    Update
  </button>
</div>
</form>
