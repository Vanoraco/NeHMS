<div class="container">
  <div class="row">
    <div class="col">
      <h5 class="card-title">Room</h5>
    </div>
    <div class="col">
      <button
              type="button"
              class="btn btn-success float-end mt-3 ms-1"
              (click)="exportToExcel()"
            >
              Export To Excel
            </button>
      <button
        type="button"
        class="btn btn-primary float-end mt-3"
        data-bs-toggle="modal"
        data-bs-target="#staticBackdrop"
        (click)="modalAdd()"
      >
        Add Room
      </button>
    </div>
  </div>
  <div class="row justify-content-between">
    <div class="col-2 mb-3">
      <select
        (change)="onTableSizeChange($event)"
        class="form-select mt-2"
        id="pagination"
      >
        <option *ngFor="let size of tableSizes">{{ size }}</option>
      </select>
    </div>
    <div class="col-4 mb-3">
      <label for="total-invSupplier" class="mt-3 h6"
        >Total Room
        <strong class="total-num ms-2">{{ roomList$.length }}</strong></label
      >
    </div>
    <div class="col-4 mb-3">
      <input
        type="text"
        id="search"
        name="searchName"
        [(ngModel)]="searchName"
        class="form-control mt-2"
        (ngModelChange)="searchByName()"
        placeholder="Search here ..."
      />
    </div>
  </div>
  <table class="table" id="room-table">
    <thead>
      <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Code</th>
      <th>Building</th>
      <th>Floor-Number</th>
      <th>Description</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="
          let item of roomList$
           
        "
      >
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.code }}</td>
        <td>{{ buildingNameMap.get(item.buildingId) }}</td>
        <td>{{ item.floorNumber }}</td>
        <td>{{ item.description }}</td>
        <td>
          <i
            (click)="modalEdit(item)"
            data-bs-toggle="modal"
            data-bs-target="#staticBackdrop"
            class="bi bi-pencil-square icon-edit"
          ></i>
          <i (click)="delete(item)" class="bi bi-trash icon-delete"></i>
        </td>
      </tr>
    </tbody>
  </table>
  <pagination-controls
    (pageChange)="onTableDataChange($event)"
  ></pagination-controls>
  <div
    class="modal fade"
    id="staticBackdrop"
    data-bs-backdrop="static"
    data-bs-keyboard="false"
    tabindex="-1"
    aria-labelledby="staticBackdropLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel">{{ modalTitle }}</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
            (click)="modalClose()"
            id="add-edit-modal-close"
          ></button>
        </div>
        <div class="modal-body">
          <app-add-edit-room
            [roomList]="roomList"
            *ngIf="activateRoomComponent"
          >
          </app-add-edit-room>
        </div>
      </div>
    </div>
  </div>
</div>
