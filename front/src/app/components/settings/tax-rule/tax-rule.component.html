<main id="main" class="main">
  <div class="pagetitle">
    <h1>Tax Rule</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item active">Tax Rule</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <div class="row">
              <div class="col">
                <h5 class="card-title">Tax Rule</h5>
              </div>
              <div class="col">
                <button
                  type="button"
                  class="btn btn-success float-end mt-3 ms-1"
                  (click)="exportToExcel()"
                >
                  Export To Excel
                </button>
                <button
                  type="button"
                  class="btn btn-primary float-end mt-3"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop"
                  (click)="modalAdd()"
                >
                  <strong>+</strong>
                  Tax Rule
                </button>
              </div>
            </div>
            <div class="row justify-content-between">
              <div class="col-2 mb-3">
                <select
                  (change)="onTableSizeChange($event)"
                  class="form-select mt-2"
                  id="pagination"
                >
                  <option *ngFor="let size of tableSizes">{{ size }}</option>
                </select>
              </div>
              <div class="col-4 mb-3">
                <label for="total-revenue" class="mt-3 h6"
                  >Total Tax Rules List
                  <strong class="total-num">{{
                    taxRulesList$.length
                  }}</strong></label
                >
              </div>
              <div class="col-4 mb-3">
                <input
                  type="text"
                  id="search"
                  name="searchName"
                  [(ngModel)]="searchName"
                  class="form-control mt-2"
                  (ngModelChange)="searchByName()"
                  placeholder="Search here ..."
                />
              </div>
            </div>
            <table class="table" id="room-table">
              <thead>
                <tr>
                  <th style="cursor: pointer" (click)="sort('id')">
                    Id<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('id')">
                    From Salary<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('id')">
                    To Salary<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('id')">
                    Percentage Amount<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('id')">
                    Deduction<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let item of taxRulesList$
                     
                  "
                >
                  <td>{{ item.id }}</td>
                  <td>{{ item.fromSalary }}</td>
                  <td>{{ item.toSalary }}</td>
                  <td>{{ item.percentageAmount }}</td>
                  <td>{{ item.deduction }}</td>
                  <td>
                    <i
                      (click)="modalEdit(item)"
                      data-bs-toggle="modal"
                      data-bs-target="#staticBackdrop"
                      class="bi bi-pencil-square icon-edit"
                    ></i>
                    <i
                      (click)="delete(item)"
                      class="bi bi-trash icon-delete"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
            <pagination-controls
              (pageChange)="onTableDataChange($event)"
            ></pagination-controls>
            <div
              class="modal fade"
              id="staticBackdrop"
              data-bs-backdrop="static"
              data-bs-keyboard="false"
              tabindex="-1"
              aria-labelledby="staticBackdropLabel"
              aria-hidden="true"
            >
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="staticBackdropLabel">
                      {{ modalTitle }}
                    </h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                      (click)="modalClose()"
                      id="modal-close"
                    ></button>
                  </div>

                  <div class="modal-body">
                    <app-add-edit-tax-rule
                      [taxRulesList]="taxRulesList"
                      *ngIf="activateTaxRulesComponent"
                    >
                    </app-add-edit-tax-rule>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
