<div class="row">
  <div class="col">
    <h5 class="card-title">Medical Department</h5>
  </div>
  <div class="col">
    <button
      type="button"
      class="btn btn-primary float-end mt-3"
      data-bs-toggle="modal"
      data-bs-target="#staticBackdrop"
      (click)="modalAdd()"
    >
      <strong>+</strong> Medical Department
    </button>
  </div>
</div>
<div class="row justify-content-between">
  <div class="col-2 mb-3">
    <select
      (change)="onTableSizeChange($event)"
      class="form-select mt-2"
      id="pagination"
    >
      <option *ngFor="let size of tableSizes">{{ size }}</option>
    </select>
  </div>
  <div class="col-4 mb-3">
    <label for="total-revenue" class="mt-3 h6"
      >Total Medical Department
      <strong class="total-num">{{
        medicalDepartmentList$.length
      }}</strong></label
    >
  </div>
  <div class="col-4 mb-3">
    <input
      type="text"
      id="search"
      name="searchName"
      [(ngModel)]="searchName"
      class="form-control mt-2"
      (ngModelChange)="searchByName()"
      placeholder="Search here ..."
    />
  </div>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col" style="cursor: pointer" (click)="sort('id')">
        Id<i class="fa fa-fw fa-sort"></i>
      </th>
      <th scope="col" style="cursor: pointer" (click)="sort('id')">
        Name<i class="fa fa-fw fa-sort"></i>
      </th>
      <th style="cursor: pointer" (click)="sort('id')">
        Description<i class="fa fa-fw fa-sort"></i>
      </th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr
      *ngFor="
        let item of medicalDepartmentList$
         
      "
    >
      <td>{{ item.id }}</td>
      <td>{{ item.name }}</td>
      <td>{{ item.description }}</td>
      <td>
        <i
          (click)="modalEdit(item)"
          data-bs-toggle="modal"
          data-bs-target="#staticBackdrop"
          class="bi bi-pencil-square icon-edit"
        >
        </i>
        <i class="bi bi-trash icon-delete" (click)="delete(item)"> </i>
      </td>
    </tr>
  </tbody>
</table>
<pagination-controls
  (pageChange)="onTableDataChange($event)"
></pagination-controls>
<div
  class="modal fade"
  id="staticBackdrop"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="staticBackdropLabel"
  aria-hidden="true"
>
  <div class="modal-dialog rounded-1 border border-0">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="staticBackdropLabel">{{ modalTitle }}</h5>
        <button
          type="button"
          class="btn bg-white rounded-circle btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
          (click)="modalClose()"
          id="modal-close"
        ></button>
      </div>
      <div class="modal-body">
        <app-add-edit-medical-department
          [medicalDepartmentList]="medicalDepartmentList"
          *ngIf="activateMedicalDepartmentComponent"
        >
        </app-add-edit-medical-department>
      </div>
    </div>
  </div>
</div>
