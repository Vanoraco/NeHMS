<form #medDepartForm="ngForm">
  <div class="mb-3">
    <label for="description" class="form-label">Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="name"
      name="name"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #Name="ngModel"
      [ngClass]="{ 'is-invalid': Name.errors && Name.touched }"
      required
    />
    <span
      class="text-danger"
      *ngIf="(Name.touched || medDepartForm.submitted) && Name.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="text-center float-end">
    <button
      (click)="addMedicalDepartment()"
      *ngIf="medicalDepartmentList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="medicalDepartmentList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateMedicalDepartment()"
      *ngIf="medicalDepartmentList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="medicalDepartmentList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
