<form>
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" [(ngModel)]="name" name="name" />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="mb-3">
    <label for="permission" class="form-label">Permission</label>
    <select
      class="form-select"
      size="3"
      [(ngModel)]="permission"
      name="permission"
      multiple
    >
      <option *ngFor="let item of permissionList$ | async" [value]="item.name">
        {{ item.name }}
      </option>
    </select>
  </div>
  <div class="text-center float-end">
    <button
      (click)="addEmployeeRoles()"
      *ngIf="employeeRolesList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="employeeRolesList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateEmployeeRoles()"
      *ngIf="employeeRolesList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="employeeRolesList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
