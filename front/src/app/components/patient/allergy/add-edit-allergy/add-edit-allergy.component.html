<form #allergyForm="ngForm">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input
      type="text"
      minlength="2"
      #Name="ngModel"
      [ngClass]="{ 'is-invalid': Name.errors && Name.touched }"
      required
      class="form-control"
      [(ngModel)]="name"
      name="name"
    />
    <span
      class="text-danger"
      *ngIf="(Name.touched || allergyForm.submitted) && Name.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    ></textarea>
  </div>
  <div class="float-end">
    <button
      (click)="addAllergy()"
      [disabled]="allergyForm.invalid"
      *ngIf="allergyList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button type="reset" *ngIf="allergyList.id == 0" class="btn btn-info ms-2">
      Reset
    </button>
    <button
      (click)="updateAllergy()"
      [disabled]="allergyForm.invalid"
      *ngIf="allergyList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button type="reset" *ngIf="allergyList.id != 0" class="btn btn-info ms-2">
      Reset
    </button>
  </div>
</form>
