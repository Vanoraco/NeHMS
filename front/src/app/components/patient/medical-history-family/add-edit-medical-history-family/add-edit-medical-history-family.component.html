<form #medicalHistoryFamilyForm="ngForm">
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Patient</label>
    <div class="col-sm-12">
      <select [(ngModel)]="patientId" name="patientId">
        <option
          *ngFor="let item of getPatientList$ | async"
          [value]="item.id"
          >{{ item.firstName + " " + item.lastName }}</option
        >
      </select>
    </div>
  </div>

  <div class="mb-3">
    <label for="familyDisease" class="form-label">Family Disease</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="familyDisease"
      name="familyDisease"
    />
  </div>
  <div class="mb-3">
    <label for="deceasedFamily" class="form-label">Deceased Family</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="deceasedFamily"
      name="deceasedFamily"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #Name="ngModel"
      [ngClass]="{ 'is-invalid': Name.errors && Name.touched }"
      required
    />
    <span
      class="text-danger"
      *ngIf="
        (Name.touched || medicalHistoryFamilyForm.submitted) && Name.invalid
      "
    >
      Please enter a valid input
    </span>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea
      class="form-control"
      [(ngModel)]="description"
      name="description"
    ></textarea>
  </div>
  <div class="float-end">
    <button
      (click)="addMedicalHistoryFamily()"
      [disabled]="medicalHistoryFamilyForm.invalid"
      *ngIf="medicalHistoryFamilyList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="medicalHistoryFamilyList.id == 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
    <button
      (click)="updateMedicalHistoryFamily()"
      [disabled]="medicalHistoryFamilyForm.invalid"
      *ngIf="medicalHistoryFamilyList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="medicalHistoryFamilyList.id != 0"
      class="btn btn-info ms-2"
    >
      Reset
    </button>
  </div>
</form>
