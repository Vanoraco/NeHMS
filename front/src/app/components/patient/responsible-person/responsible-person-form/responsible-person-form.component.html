<form #resForm="ngForm">
  <div class="row g-3">
    <div class="col-6">
      <label for="firstName" class="form-label">First Name</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="firstName"
        name="firstName"
        required
        pattern="[a-zA-Z\s]+$"
        minlength="2"
        #fName="ngModel"
      />
      <span
        class="text-danger"
        *ngIf="(fName.touched || resForm.submitted) && fName.invalid"
      >
        Enter a valid input
      </span>
    </div>
    <div class="col-6">
      <label for="lastName" class="form-label">Last Name</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="lastName"
        name="lastName"
        required
        pattern="[a-zA-Z\s]+$"
        minlength="2"
        #LName="ngModel"
      />
      <span
        class="text-danger"
        *ngIf="(LName.touched || resForm.submitted) && LName.invalid"
      >
        Please enter a valid input
      </span>
    </div>
    <div class="col-6">
      <label for="phone" class="form-label">Phone</label>
      <input
        type="tel"
        class="form-control"
        [(ngModel)]="phone"
        name="phone"
        pattern="[0-9]+"
        minlength="10"
        #Phone="ngModel"
        required
      />
      <span
        class="text-danger"
        *ngIf="(Phone.touched || resForm.submitted) && Phone.invalid"
      >
        Please enter a valid input
      </span>
    </div>
    <div class="col-6">
      <label for="address" class="form-label">Address</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="address"
        name="address"
        required
        pattern="[a-zA-Z\s]+$"
        minlength="3"
        #Address="ngModel"
      />
      <span
        class="text-danger"
        *ngIf="(Address.touched || resForm.submitted) && Address.invalid"
      >
        Please enter a valid input
      </span>
    </div>
    <!-- <div class="col-6">
      <label for="patientId" class="form-label">Patient</label>
      <select id="patientId" [(ngModel)]="patientId" name="patientId">
        <option
          *ngFor="let item of patientList$ | async as list"
          value="{{ item.id }}"
          >{{ item.firstName + " " + item.middleName }}</option
        >
      </select>
    </div> -->
    <div class="col-6">
      <label for="countryId" class="form-label">Country</label>
      <select id="countryId" [(ngModel)]="countryId" name="countryId">
        <option
          *ngFor="let item of countryList$ | async as list"
          value="{{ item.id }}"
          >{{ item.name }}</option
        >
      </select>
    </div>
    <div class="col-6">
      <label for="cityId" class="form-label">City</label>

      <select id="cityId" [(ngModel)]="cityId" name="cityId">
        <option
          *ngFor="let item of cityList$ | async as list"
          value="{{ item.id }}"
          >{{ item.name }}</option
        >
      </select>
    </div>
    <div class="col-6">
      <label for="relationshipId" class="form-label">Relationship</label>
      <select
        id="relationshipId"
        [(ngModel)]="relationshipId"
        name="relationshipId"
      >
        <option value="1">Mother</option>
        <option value="2">Father</option>
        <option value="3">Brother</option>
        <option value="4">Sister</option>
      </select>
    </div>

    <div class="text-center float-end justify-right">
      <button
        [disabled]="resForm.invalid"
        (click)="addResponsiblePerson()"
        *ngIf="responsiblePersonList.id == 0"
        class="btn btn-primary"
      >
        Save
      </button>
      <button
        type="reset"
        *ngIf="responsiblePersonList.id == 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
      <button
        [disabled]="resForm.invalid"
        (click)="updateResponsiblePerson()"
        *ngIf="responsiblePersonList.id != 0"
        class="btn btn-primary"
      >
        Update
      </button>
      <button
        type="reset"
        *ngIf="responsiblePersonList.id != 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
    </div>
  </div>
</form>
