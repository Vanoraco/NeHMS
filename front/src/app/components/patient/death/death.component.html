<main id="main" class="main">
    <div class="pagetitle">
       <h1>death</h1>
       <nav>
          <ol class="breadcrumb">
             <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
             <li class="breadcrumb-item active">death</li>
          </ol>
       </nav>
    </div>
    <section class="section">
       <div class="row">
          <div class="col-lg-12">
             <div class="card">
                <div class="card-body">
                  <div class="container">
                     <div class="row">
                       <div class="col">
                         <h5 class="card-title">death</h5>
                       </div>
                       <div class="col">
                         <button
                           type="button"
                           class="btn btn-primary float-end mt-3"
                           data-bs-toggle="modal"
                           data-bs-target="#staticBackdrop"
                           (click)="modalAdd()"
                         >
                           Add death
                         </button>
                       </div>
                     </div>
                     <div class="row justify-content-between">
                      <div class="col-2 mb-3">
                        <select
                          (change)="onTableSizeChange($event)"
                          class="form-select mt-2"
                          id="pagination"
                        >
                          <option *ngFor="let size of tableSizes">{{ size }}</option>
                        </select>
                      </div>
                      <div class="col-4 mb-3">
                        <label for="total-revenue" class="mt-3 h6"
                          >Total death List
                          <strong class="total-num">{{
                            deathList$.length
                          }}</strong></label
                        >
                      </div>
                      <div class="col-4 mb-3">
                        <input
                          type="text"
                          id="search"
                          name="searchName"
                          [(ngModel)]="searchName"
                          class="form-control mt-2"
                          (ngModelChange)="searchByName()"
                          placeholder="Search here ..."
                        />
                      </div>
                    </div>
                     <table class="table">
                      <thead>
                        <th style="cursor: pointer" (click)="sort('id')">
                          Id<i class="fa fa-fw fa-sort"></i>
                        </th>
                        <th style="cursor: pointer" (click)="sort('id')">
                          Employee<i class="fa fa-fw fa-sort"></i>
                        </th>
                        <th style="cursor: pointer" (click)="sort('id')">
                          Patient<i class="fa fa-fw fa-sort"></i>
                        </th>
                        <th style="cursor: pointer" (click)="sort('id')">
                          Date<i class="fa fa-fw fa-sort"></i>
                        </th>
                        <th style="cursor: pointer" (click)="sort('id')">
                          Description<i class="fa fa-fw fa-sort"></i>
                        </th>
                        <th>Action</th>
                      </thead>
                       <tbody>
                         <tr *ngFor="let item of deathList$ 
                     "
                   >
                           <td>{{ item.id }}</td>
                           <td>{{ employeeNameMap.get(item.employeeId) }}</td>
                           <td>{{ patientNameMap.get(item.patientId) }}</td>
                           <td>{{ item.date }}</td>
                           <td>{{ item.description }}</td>
                           <td>
                    
                              <button
                                class="btn btn-outline-primary me-2 mb-1"
                                (click)="modalEdit(item)"
                                data-bs-toggle="modal"
                                data-bs-target="#staticBackdrop"
                              >
                                <i class="bi bi-pencil-square"></i>
                              </button>
                              <button
                                class="btn btn-outline-danger me-2 mb-1"
                                (click)="delete(item)"
                              >
                                <i class="bi bi-trash"></i>
                              </button>
                            </td>
                         </tr>
                       </tbody>
                     </table>
                     <pagination-controls
                    (pageChange)="onTableDataChange($event)"
                  ></pagination-controls>
                     <div
                       class="modal fade"
                       id="staticBackdrop"
                       data-bs-backdrop="static"
                       data-bs-keyboard="false"
                       tabindex="-1"
                       aria-labelledby="staticBackdropLabel"
                       aria-hidden="true"
                     >
                       <div class="modal-dialog">
                         <div class="modal-content">
                           <div class="modal-header">
                             <h5 class="modal-title" id="staticBackdropLabel">{{ modalTitle }}</h5>
                             <button
                               type="button"
                               class="btn-close"
                               data-bs-dismiss="modal"
                               aria-label="Close"
                               (click)="modalClose()"
                               id="modal-close"
                             ></button>
                           </div>
                      

                           <div class="modal-body">
                            <app-add-edit-death
                              [deathList]="deathList"
                              *ngIf="activatedeathComponent"
                            >
                            </app-add-edit-death>
                          </div>
                         </div>
                       </div>
                     </div>
                   </div>
                   
                </div>
             </div>
          </div>
       </div>
    </section>
 </main>
