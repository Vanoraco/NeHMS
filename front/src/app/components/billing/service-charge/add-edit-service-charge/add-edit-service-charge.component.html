<form #serviceChargeForm="ngForm">
  <div class="mb-3">
    <label for="description" class="form-label">Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="name"
      name="name"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #Name="ngModel"
      [ngClass]="{ 'is-invalid': Name.errors && Name.touched }"
      required
    />
    <span
      class="text-danger"
      *ngIf="(Name.touched || serviceChargeForm.submitted) && Name.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Price</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="price"
      name="price"
    />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>

  <div class="text-center float-end">
    <button
      (click)="addServiceCharge()"
      *ngIf="serviceChargeList.id == 0"
      class="btn btn-primary"
      [disabled]="serviceChargeForm.invalid"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="serviceChargeList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateServiceCharge()"
      *ngIf="serviceChargeList.id != 0"
      class="btn btn-primary"
      [disabled]="serviceChargeForm.invalid"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="serviceChargeList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
