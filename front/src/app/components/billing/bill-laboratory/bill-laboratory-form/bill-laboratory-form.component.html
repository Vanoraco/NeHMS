<form>
  <div class="mb-3">
    <label for="employeeId" class="form-label">Accountant</label>
    <select id="employeeId" [(ngModel)]="employeeId" name="employeeId">
      <option
        *ngFor="let item of employeeList$ | async as list"
        [value]="item.id"
        >{{ item.firstName + " " + item.middleName }}</option
      >
    </select>
  </div>
  <!-- <div class="mb-3">
    <label for="labRequestId" class="form-label">Lab Request</label>
    <select id="labRequestId" [(ngModel)]="labRequestId" name="labRequestId">
      <option
        *ngFor="let item of labRequestList$ | async as list"
        [value]="item.id"
        >{{ item.result }}</option
      >
    </select>
  </div> -->
  <div class="mb-3">
    <label for="serviceChargeId" class="form-label">Service Charge</label>
    <select
      id="serviceChargeId"
      [(ngModel)]="serviceChargeId"
      name="serviceChargeId"
    >
      <option
        *ngFor="let item of serviceChargeList$ | async as list"
        [value]="item.id"
        >{{ item.name }}</option
      >
    </select>
  </div>
  <div class="mb-3">
    <label for="date" class="form-label">Date</label>
    <input
      type="date"
      class="form-control"
      [(ngModel)]="date"
      name="date"
      required
    />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
      required
    />
  </div>
  <div class="text-center float-end">
    <button
      (click)="addBillLab()"
      *ngIf="billLabList.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button type="reset" *ngIf="billLabList.id == 0" class="btn btn-info ms-3">
      Reset
    </button>
    <button
      (click)="updateBillLab()"
      *ngIf="billLabList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button type="reset" *ngIf="billLabList.id != 0" class="btn btn-info ms-3">
      Reset
    </button>
  </div>
</form>
