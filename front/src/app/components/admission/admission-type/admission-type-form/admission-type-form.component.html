<form #AdForm="ngForm" >
<div class="row g-3">
    <div class="col-12">
      <label for="name" class="form-label">Admission Type</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="name"
        name="name"
        required
        pattern="[a-zA-Z\s]+$"
        minlength="2"
        #Address="ngModel"
      />
      <span
          class="text-danger"
          *ngIf="(Address.touched ||  AdForm.submitted) && Address.invalid"
        >
          Please enter a valid input
        </span>
    </div>
    <div class="col-12">
      <label for="description" class="form-label">Description</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="description"
        name="description"
        required
      />
    </div>
  
    <div class="text-center float-end justify-right">
      <button
        (click)="addAdmissionType()"
        *ngIf="AdmissionTypeList.id == 0"
        class="btn btn-primary"
      >
        Save
      </button>
      <button
        type="reset"
        *ngIf="AdmissionTypeList.id == 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
      <button
        (click)="updateAdmissionType()"
        *ngIf="AdmissionTypeList.id != 0"
        class="btn btn-primary"
      >
        Update
      </button>
      <button
        type="reset"
        *ngIf="AdmissionTypeList.id != 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
    </div>
  </div>
  </form>
