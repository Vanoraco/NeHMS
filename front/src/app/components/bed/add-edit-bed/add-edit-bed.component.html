<form>
  <div class="mb-3">
    <label for="name" class="form-label">Bed Name</label>
    <input type="text" class="form-control" [(ngModel)]="name" name="name" />
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Bed Type</label>
    <div class="col-sm-12">
      <select class="form-select" [(ngModel)]="bedTypeId" name="bedTypeId">
        <option *ngFor="let item of bedTypeList$ | async" value="{{ item.id }}">
          {{ item.name }}
        </option>
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Ward</label>
    <div class="col-sm-12">
      <select class="form-select" [(ngModel)]="wardId" name="wardId">
        <option *ngFor="let item of wardList$ | async" value="{{ item.id }}">
          {{ item.name }}
        </option>
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Available</label>
    <div class="col-sm-12">
      <select class="form-select" [(ngModel)]="availableId" name="availableId">
        <option
          *ngFor="let item of availableList$ | async"
          value="{{ item.id }}"
        >
          {{ item.name }}
        </option>
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label for="code" class="form-label">Code</label>
    <input type="text" class="form-control" [(ngModel)]="code" name="code" />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="text-center float-end">
    <button (click)="addBed()" *ngIf="bedList.id == 0" class="btn btn-primary">
      Save
    </button>
    <button type="reset" *ngIf="bedList.id == 0" class="btn btn-info ms-3">
      Reset
    </button>
    <button
      (click)="updateBed()"
      *ngIf="bedList.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button type="reset" *ngIf="bedList.id != 0" class="btn btn-info ms-3">
      Reset
    </button>
  </div>
</form>
