<form>
  <div class="mb-3">
    <label for="comments" class="form-label">Alloted Date</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="allotedDate"
      name="allotedDate"
    />
  </div>
  <div class="mb-3">
    <label for="comments" class="form-label">Discourage Date</label>
    <input
      type="datetime-local"
      class="form-control"
      [(ngModel)]="discourageDate"
      name="discourageDate"
    />
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Patient ID</label>
    <div class="col-sm-12">
      <select [(ngModel)]="patientId" name="patientId">
        <option
          *ngFor="let item of patientList$ | async"
          [value]="item.id"
          >{{ item.firstName + " " + item.lastName }}</option
        >
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label class="col-sm-5 col-form-label">Bed ID</label>
    <div class="col-sm-12">
      <select [(ngModel)]="bedId" name="bedId">
        <option *ngFor="let item of bedList$ | async" [value]="item.id">
          {{ item.name }}
        </option>
      </select>
    </div>
  </div>
  <div class="text-center float-end">
    <button
      (click)="addBedAllotment()"
      *ngIf="bedAllotment.id == 0"
      class="btn btn-primary"
    >
      Save
    </button>
    <button type="reset" *ngIf="bedAllotment.id == 0" class="btn btn-info ms-3">
      Reset
    </button>
    <button
      (click)="updateBedAllotment()"
      *ngIf="bedAllotment.id != 0"
      class="btn btn-primary"
    >
      Update
    </button>
    <button type="reset" *ngIf="bedAllotment.id != 0" class="btn btn-info ms-3">
      Reset
    </button>
  </div>
</form>
