<form #bedTypeForm="ngForm">
  <div class="mb-3">
    <label for="name" class="form-label">Bed Type Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="name"
      name="name"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #BTName="ngModel"
    />
    <span
      class="text-danger"
      *ngIf="(BTName.touched || bedTypeForm.submitted) && BTName.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="code" class="form-label">Bed Type Price</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="price"
      name="price"
    />
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="text-center float-end">
    <button
      (click)="addBedType()"
      *ngIf="bedType.id == 0"
      class="btn btn-primary"
      [disabled]="bedTypeForm.invalid"
    >
      Save
    </button>
    <button type="reset" *ngIf="bedType.id == 0" class="btn btn-info ms-3">
      Reset
    </button>
    <button
      (click)="updateBedType()"
      *ngIf="bedType.id != 0"
      class="btn btn-primary"
      [disabled]="bedTypeForm.invalid"
    >
      Update
    </button>
    <button type="reset" *ngIf="bedType.id != 0" class="btn btn-info ms-3">
      Reset
    </button>
  </div>
</form>
