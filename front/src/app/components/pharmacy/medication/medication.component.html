<main id="main" class="main">
  <div class="pagetitle">
    <h1>Pharmacy</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
        <li class="breadcrumb-item">Pharmacy</li>
        <li class="breadcrumb-item active">Medication</li>
      </ol>
    </nav>
  </div>
  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card overflow-auto">
          <div class="card-body">
            <div class="row">
              <div class="col-6">
                <h5 class="card-title">Medication</h5>
              </div>
              <div class="col-6">
                <button
                  type="button"
                  class="btn btn-success float-end mt-3 ms-1"
                  (click)="exportToExcel()"
                >
                  Export To Excel
                </button>
                <button
                  type="button"
                  class="btn btn-primary float-end mt-3"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop"
                  (click)="modalAdd()"
                >
                  <i class="fa fa-plus me-2 ms-1"></i>Medication
                </button>
              </div>
            </div>
            <table class="table" id="medication-table">
              <thead>
                <tr>
                  <th style="cursor: pointer" (click)="sort('id')">
                    Id<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('name')">
                    Name<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th
                    style="cursor: pointer"
                    (click)="sort('medicineCategoryId')"
                  >
                    Medicine Category<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th style="cursor: pointer" (click)="sort('descrption')">
                    Description<i class="fa fa-fw fa-sort"></i>
                  </th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let item of medicationList$
                      | async
                  "
                >
                  <td>{{ item.id }}</td>
                  <td>{{ item.name }}</td>
                  <td>
                    {{ medicineCategoryMap.get(item.medicineCategoryId) }}
                  </td>
                  <td>{{ item.description }}</td>
                  <td>
                    <i
                      (click)="modalEdit(item)"
                      data-bs-toggle="modal"
                      data-bs-target="#staticBackdrop"
                      class="bi bi-pencil-square icon-edit"
                    ></i>
                    <i
                      (click)="delete(item)"
                      class="bi bi-trash icon-delete"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
            <div
              class="modal fade"
              id="staticBackdrop"
              data-bs-backdrop="static"
              data-bs-keyboard="false"
              tabindex="-1"
              aria-labelledby="staticBackdropLabel"
              aria-hidden="true"
            >
              <div class="modal-dialog rounded-1 border border-0">
                <div class="modal-content">
                  <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="staticBackdropLabel">
                      {{ modalTitle }}
                    </h5>
                    <button
                      type="button"
                      class="btn bg-white rounded-circle btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                      (click)="modalClose()"
                      id="add-edit-modal-close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <app-medication-form
                      [medicationList]="medicationList"
                      *ngIf="activatemedicationComponent"
                    >
                    </app-medication-form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
