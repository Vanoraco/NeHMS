<form class="row">
  <div class="col-lg-6">
    <div class="form-group mb-1">
      <label for="rightEyeSphDistant" class="form-label">Right Eye Sph (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeSphDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeSphDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="rightEyeCylDistant" class="form-label">Right Eye Cyl (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeCylDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeCylDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="rightEyeAxisDistant" class="form-label">Right Eye Axis (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeAxisDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeAxisDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="rightEyeSphClose" class="form-label">Right Eye Sph (Close)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeSphClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeSphClose"
      />
    </div>
    <div class="form-group mb-1">
      <label for="rightEyeCylClose" class="form-label">Right Eye Cyl (Close)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeCylClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeCylClose"
      />
    </div>
    <div class="form-group mb-1">
      <label for="rightEyeAxisClose" class="form-label">Right Eye Axis (Close)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="rightEyeAxisClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="rightEyeAxisClose"
      />
    </div>
    </div>
    <div class="col-lg-6">
    <div class="form-group mb-1">
      <label for="leftEyeSphDistant" class="form-label">Left Eye Sph (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeSphDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeSphDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="leftEyeCylDistant" class="form-label">Left Eye Cyl (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeCylDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeCylDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="leftEyeAxisDistant" class="form-label">Left Eye Axis (Distant)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeAxisDistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeAxisDistant"
      />
    </div>
    <div class="form-group mb-1">
      <label for="leftEyeSphClose" class="form-label">Left Eye Sph (Close)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeSphClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeSphClose"
      />
    </div>
    <div class="form-group mb-1">
      <label for="leftEyeCylClose" class="form-label">Left Eye Cyl (CLose)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeCylClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeCylClose"
      />
    </div>
    <div class="form-group mb-1">
      <label for="leftEyeAxisClose" class="form-label">Left Eye Axis (CLose)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="leftEyeAxisClose"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="leftEyeAxisClose"
      />
    </div>
  </div>
  <div class="row row-cols-lg-6">
    <div class="form-group mb-1">
      <label for="far" class="form-label">Far</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="far"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="far"
      />
    </div>
    <div class="form-group mb-1">
      <label for="near" class="form-label">Near</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="near"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="near"
      />
    </div>
    <div class="form-group mb-1">
      <label for="price" class="form-label">Price</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="price"
        [disabled]="employeeRole.name != 'Pharmacist'"
        name="price"
      />
    </div>
  </div>
  
  

  <div class="col-lg-6">
    <div class="form-group mb-1">
      <label for="photoSolar" class="form-label">Photo Solar</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="photoSolar"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="photoSolar"
      />
    </div>
    <div class="form-group mb-1">
      <label for="bifocal" class="form-label">Bifocal</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="bifocal"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="bifocal"
      />
    </div>
    <div class="form-group mb-1">
      <label for="progressive" class="form-label">Progressive</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="progressive"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="progressive"
      />
    </div>
    <div class="form-group mb-1">
      <label for="scratchResistant" class="form-label">Scratch Resistant</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="scratchResistant"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="scratchResistant"
      />
    </div>
    </div>
    <div class="col-lg-6">
    <div class="form-group mb-1">
      <label for="resinPlastic" class="form-label">Resin Plastic</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="resinPlastic"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="resinPlastic"
      />
    </div>
    <div class="form-group mb-1">
      <label for="glareFree" class="form-label">Glare Free</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="glareFree"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="glareFree"
      />
    </div>
    <div class="form-group mb-1">
      <label for="hiIndex" class="form-label">Hi Index</label>
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="hiIndex"
        [disabled]="employeeRole.name == 'Pharmacist'"
        name="hiIndex"
      />
    </div>
  </div>
  <br>
  
  <br>
  <div class="form-group mb-1">
    <label for="orderDate" class="form-label">Order Date</label>
    <input
      type="date"
      class="form-control"
      [(ngModel)]="orderDate"
      [disabled]="employeeRole.name == 'Pharmacist'"
      name="orderDate"
    />
  </div>
  
  <div class="text-center float-end mt-2">
    <button
      (click)="selAddEyewearPrescription()"
      *ngIf="prescription.id != 0 && employeeRole.name == 'Pharmacist'"
      [disabled]="isSelling == 'Processing'" 
      class="btn btn-primary"
    >
      {{ isSelling }}
    </button>
    <button
      (click)="addEyewearPrescription()"
      *ngIf="prescription.id == 0"
      [disabled]="isSaving == 'Saving'"
      class="btn btn-primary"
    >
      {{ isSaving }}
    </button>
    <button
    (click)="updateEyewearPrescription()"
    *ngIf="prescription.id != 0 && employeeRole.name != 'Pharmacist'"
    [disabled] = "isUpdating == 'Updating'"
    class="btn btn-primary"
  >
    {{ isUpdating }}
  </button>
    <button type="reset" class="btn btn-info ms-3">Reset</button>
  </div>
</form>
