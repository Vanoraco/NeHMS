<form  #MForm="ngForm" >
  <div class="row g-3">
    <div class="col-4">
      <label for="name" class="form-label">Name</label>
      <input
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #MName="ngModel"
      type="text" 
      class="form-control" 
      [(ngModel)]="name" 
      name="name" />
      <span
      class="text-danger"
      *ngIf="(MName.touched ||  MForm.submitted) && MName.invalid"
    >
      Please enter a valid input
    </span>
  
    </div>
    <div class="col-4">
      <label for="price" class="form-label">Quantity</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="quantity"
        name="quantity"
      />
    </div>
    <div class="col-4">
      <label for="medicationId" class="form-label">Medication</label>
      <select id="medicationId" [(ngModel)]="medicationId" name="medicationId">
        <option
          *ngFor="let item of medicationId$ | async as list"
          selected
          value="{{ item.id }}"
          >{{ item.name }}</option
        >
      </select>
    </div>
    <div class="col-4">
      <label for="employeeId" class="form-label">Employee</label>
      <select id="employeeId" [(ngModel)]="employeeId" name="employeeId">
        <option
          *ngFor="let item of employeeId$ | async as list"
          selected
          value="{{ item.id }}"
          >{{ item.firstName + " " + item.lastName }}</option
        >
      </select>
    </div>
    <div class="col-4">
      <label for="medSupplierId" class="form-label">Supplier</label>
      <select
        id="medSupplierId"
        [(ngModel)]="medSupplierId"
        name="medSupplierId"
      >
        <option
          *ngFor="let item of supplierId$ | async as list"
          selected
          value="{{ item.id }}"
          >{{ item.name }}</option
        >
      </select>
    </div>
    <div class="col-6">
      <label for="expirationDate" class="form-label">Expiration Date</label>
      <input
        type="datetime-local"
        class="form-control"
        [(ngModel)]="expirationDate"
        name="expirationDate"
      />
    </div>
    <div class="col-6">
      <label for="timeSatamp" class="form-label">Timestamp</label>
      <input
        type="datetime-local"
        class="form-control"
        [(ngModel)]="timeSatamp"
        name="timeSatamp"
      />
    </div>
    <div class="col-6">
      <label for="batchNumber" class="form-label">Batch Number</label>
      <input
        type="text"
        pattern="[0-9]+"
        class="form-control"
        [(ngModel)]="batchNumber"
        name="batchNumber"
        #BatchNo="ngModel"
      />
      <span
              class="text-danger"
              *ngIf="(BatchNo.touched ||  MForm.submitted) && BatchNo.invalid"
            >
              Please enter a valid input
            </span>
    </div>
    <div class="col-6">
      <label for="description" class="form-label">Description</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="description"
        name="description"
      />
    </div>
  
    <div class="text-center float-end justify-right">
      <button
        (click)="addMedicineStockHospital()"
        *ngIf="medStockHospital.id == 0"
        class="btn btn-primary"
      >
        Save
      </button>
      <button
        type="reset"
        *ngIf="medStockHospital.id == 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
      <button
        (click)="updateMedicineStockHospital()"
        *ngIf="medStockHospital.id != 0"
        class="btn btn-primary"
      >
        Update
      </button>
      <button
        type="reset"
        *ngIf="medStockHospital.id != 0"
        class="btn btn-info ms-3"
      >
        Reset
      </button>
    </div>
  </div>
  </form>
