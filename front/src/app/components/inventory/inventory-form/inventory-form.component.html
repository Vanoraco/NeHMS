<form  #IForm="ngForm" >
  <div class="row g-3">
      <div class="col-4">
        <label for="name" class="form-label">Name</label>
        <input
        type="text"
        pattern="[a-zA-Z\s]+$"
        minlength="2"
        #ZName="ngModel"
        class="form-control"
        [(ngModel)]="name"
        name="name" />
        <span
          class="text-danger"
          *ngIf="(ZName.touched ||  IForm.submitted) && ZName.invalid"
        >
          Please enter a valid input
        </span>
      </div>
      <div class="col-4">
        <label for="price" class="form-label">Quantity</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="quantity"
          name="quantity"
        />
      </div>
      <div class="col-4">
        <label for="employeeId" class="form-label">Admin</label>
        <select id="employeeId" [(ngModel)]="employeeId" name="employeeId">
          <option
            *ngFor="let item of employeeId$ | async as list"
            selected
            value="{{ item.id }}"
            >{{ item.firstName + " " + item.lastName }}</option
          >
        </select>
      </div>
      <div class="col-4">
        <label for="inventorySupplyId" class="form-label">Supplier</label>
        <select
          id="inventorySupplyId"
          [(ngModel)]="inventorySupplyId"
          name="inventorySupplyId"
        >
          <option
            *ngFor="let item of supplierId$ | async as list"
            selected
            value="{{ item.id }}"
            >{{ item.name }}</option
          >
        </select>
      </div>
      <div class="col-6">
        <label for="expireDate" class="form-label">Expiration Date</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="expireDate"
          name="expireDate"
        />
      </div>
      <div class="col-6">
        <label for="Date" class="form-label">Date</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="date"
          name="date"
        />
      </div>
      <div class="col-6">
        <label for="description" class="form-label">Description</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="description"
          name="description"
        />
      </div>

      <div class="text-center float-end justify-right">
        <button
          (click)="addInventory()"
          [disabled]="IForm.invalid"
          *ngIf="inventoryList.id == 0"
          class="btn btn-primary"
        >
          Save
        </button>
        <button
          type="reset"
          *ngIf="inventoryList.id == 0"
          class="btn btn-info ms-3"
        >
          Reset
        </button>
        <button
          [disabled]="IForm.invalid"
          (click)="updateInventory()"
          *ngIf="inventoryList.id != 0"
          class="btn btn-primary"
        >
          Update
        </button>
        <button
          type="reset"
          *ngIf="inventoryList.id != 0"
          class="btn btn-info ms-3"
        >
          Reset
        </button>
      </div>
    </div>
  </form>
