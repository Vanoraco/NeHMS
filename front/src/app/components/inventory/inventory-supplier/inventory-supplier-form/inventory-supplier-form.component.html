<form #SForm="ngForm">
  <div class="mb-3">
    <label for="name" class="form-label">Supplier Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="name"
      name="name"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #SName="ngModel"
    />
    <span
      class="text-danger"
      *ngIf="(SName.touched || SForm.submitted) && SName.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="address" class="form-label">Supplier Address</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="address"
      name="address"
      pattern="[a-zA-Z\s]+$"
      minlength="2"
      #FName="ngModel"
    />
    <span
      class="text-danger"
      *ngIf="(FName.touched || SForm.submitted) && FName.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="phoneNumber" class="form-label">Supplier Phone</label>
    <input
      type="text"
      pattern="[0-9]+"
      minlength="10"
      #Phone="ngModel"
      class="form-control"
      [(ngModel)]="phoneNumber"
      name="phoneNumber"
    />
    <span
      class="text-danger"
      *ngIf="(Phone.touched || SForm.submitted) && Phone.invalid"
    >
      Please enter a valid input
    </span>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="description"
      name="description"
    />
  </div>
  <div class="text-center float-end">
    <button
      (click)="addInvSupplier()"
      *ngIf="inventorySupplierList.id == 0"
      class="btn btn-primary"
      [disabled]="SForm.invalid"
    >
      Save
    </button>
    <button
      type="reset"
      *ngIf="inventorySupplierList.id == 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
    <button
      (click)="updateInvSupplier()"
      *ngIf="inventorySupplierList.id != 0"
      class="btn btn-primary"
      [disabled]="SForm.invalid"
    >
      Update
    </button>
    <button
      type="reset"
      *ngIf="inventorySupplierList.id != 0"
      class="btn btn-info ms-3"
    >
      Reset
    </button>
  </div>
</form>
